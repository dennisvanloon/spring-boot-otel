apiVersion: v1
kind: ConfigMap
metadata:
  name: kibana-config
  namespace: elastic
data:
  kibana.yml: |
    server.host: "0.0.0.0"
    elasticsearch.hosts: ["http://elasticsearch:9200"]
    elasticsearch.username: "kibana_system"
    elasticsearch.password: "${KIBANA_SYSTEM_PASSWORD}"
    xpack.encryptedSavedObjects.encryptionKey: "a7f3d2e1b8c9f4a6e2d1b7c3f8a4d9e0"
