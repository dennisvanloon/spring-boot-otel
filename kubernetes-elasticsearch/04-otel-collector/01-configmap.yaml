apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: elastic
data:
  config.yaml: |
    extensions:
      health_check:
        endpoint: 0.0.0.0:13133

    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      memory_limiter:
        limit_mib: 256
        spike_limit_mib: 64
        check_interval: 5s
      batch:
        timeout: 1s

    exporters:
      otlp/apm:
        endpoint: "http://apm-server:8200"
        tls:
          insecure: true
      debug:
        verbosity: basic

    service:
      extensions: [health_check]
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [otlp/apm, debug]
        metrics:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [otlp/apm, debug]
        logs:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [otlp/apm, debug]
