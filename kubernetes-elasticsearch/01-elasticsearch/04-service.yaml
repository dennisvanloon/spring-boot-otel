# Headless service voor pod-to-pod discovery
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch-headless
  namespace: elastic
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: elasticsearch
  ports:
    - name: http
      port: 9200
      targetPort: 9200
    - name: transport
      port: 9300
      targetPort: 9300
---
# ClusterIP service voor HTTP toegang vanuit Kibana en andere services
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch
  namespace: elastic
spec:
  selector:
    app: elasticsearch
  ports:
    - name: http
      port: 9200
      targetPort: 9200
