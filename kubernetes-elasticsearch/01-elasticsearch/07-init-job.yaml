apiVersion: batch/v1
kind: Job
metadata:
  name: elasticsearch-init
  namespace: elastic
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init
          image: docker.elastic.co/elasticsearch/elasticsearch:8.17.3
          command:
            - /bin/bash
            - -c
            - |
              echo "Wachten tot Elasticsearch cluster healthy is..."
              for i in $(seq 1 60); do
                STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                  -u "elastic:${ELASTIC_PASSWORD}" \
                  http://elasticsearch:9200/_cluster/health)
                if [ "$STATUS" = "200" ]; then
                  echo "Cluster bereikbaar"
                  break
                fi
                echo "Poging ${i}/60 - wacht 10s..."
                sleep 10
              done

              echo "kibana_system wachtwoord instellen..."
              RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
                -u "elastic:${ELASTIC_PASSWORD}" \
                -H 'Content-Type: application/json' \
                -d "{\"password\":\"${KIBANA_SYSTEM_PASSWORD}\"}" \
                http://elasticsearch:9200/_security/user/kibana_system/_password)
              HTTP_CODE=$(echo "$RESPONSE" | tail -1)
              echo "Response code: ${HTTP_CODE}"

              echo "kibana wachtwoord instellen..."
              RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
                -u "elastic:${ELASTIC_PASSWORD}" \
                -H 'Content-Type: application/json' \
                -d "{\"password\":\"${KIBANA_SYSTEM_PASSWORD}\"}" \
                http://elasticsearch:9200/_security/user/kibana/_password)
              HTTP_CODE=$(echo "$RESPONSE" | tail -1)
              echo "Response code: ${HTTP_CODE}"

              echo "Klaar."
          env:
            - name: ELASTIC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: elasticsearch-credentials
                  key: elastic-password
            - name: KIBANA_SYSTEM_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: elasticsearch-credentials
                  key: kibana-system-password
