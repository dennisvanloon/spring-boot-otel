apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: grafana

data:
  datasources.yaml: |
    apiVersion: 1

    datasources:
      - name: Mimir
        type: prometheus
        access: proxy
        url: http://mimir.monitoring.svc.cluster.local:9009
        isDefault: true

      - name: Loki
        type: loki
        access: proxy
        url: http://loki.loki.svc.cluster.local:3100

      - name: Tempo
        type: tempo
        access: proxy
        url: http://tempo.tracing.svc.cluster.local:3200
