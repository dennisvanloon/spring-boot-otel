apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: elasticsearch
  namespace: elastic
spec:
  serviceName: elasticsearch
  replicas: 1
  selector:
    matchLabels:
      app: elasticsearch
  template:
    metadata:
      labels:
        app: elasticsearch
    spec:
      containers:
        - name: elasticsearch
          image: docker.elastic.co/elasticsearch/elasticsearch:9.0.1
          ports:
            - name: http
              containerPort: 9200
            - name: transport
              containerPort: 9300
          env:
            - name: ELASTIC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: elasticsearch-credentials
                  key: elastic-password
            - name: KIBANA_SYSTEM_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: elasticsearch-credentials
                  key: kibana-system-password
            - name: ES_JAVA_OPTS
              value: "-Xms1g -Xmx1g"
          resources:
            requests:
              memory: "1.5Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          volumeMounts:
            - name: config
              mountPath: /usr/share/elasticsearch/config/elasticsearch.yml
              subPath: elasticsearch.yml
            - name: data
              mountPath: /usr/share/elasticsearch/data
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - |
                  curl -s -u "elastic:${ELASTIC_PASSWORD}" http://localhost:9200/_cluster/health \
                    | grep -qE '"status":"(green|yellow)"'
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
          # Stelt het kibana_system wachtwoord in zodra Elasticsearch klaar is
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/bash
                  - -c
                  - |
                    for i in $(seq 1 30); do
                      STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                        -u "elastic:${ELASTIC_PASSWORD}" http://localhost:9200/_cluster/health)
                      [ "$STATUS" = "200" ] && break
                      sleep 10
                    done
                    curl -s -X POST \
                      -u "elastic:${ELASTIC_PASSWORD}" \
                      -H 'Content-Type: application/json' \
                      -d "{\"password\":\"${KIBANA_SYSTEM_PASSWORD}\"}" \
                      http://localhost:9200/_security/user/kibana_system/_password || true
      volumes:
        - name: config
          configMap:
            name: elasticsearch-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi